---
version: "3"

tasks:
  install.tools:
    desc: Install all tools with help of asdf
    summary: |
      It will pickup up versions from .tool-versions file and install them.

      Postgres is kept out of that file, because we want to manage it via brew services.
    cmds:
      - asdf install

  install.deps:
    desc: Fetch & Compile dependencies
    cmds:
      - mix do deps.get, deps.compile

  setup.server:
    desc: Install the server
    cmds:
      - tasks: [install:deps]
      - mix ecto.create
      - mix ecto.migrate

  start.server:
    desc: Run the server
    cmds:
      - elixir --name derpy-coder@127.0.0.1 -S mix phx.server

  start.console:
    desc: Run iex in conjunction with the server
    summary: |
      Make sure the server is running.
      This is useful for running iex alongside server.
      Which means any PubSub events fired from iex is received by the server.
    cmds:
      - iex --name "console@127.0.0.1" --remsh "derpy-coder@127.0.0.1"

  start.iex:
    desc: Run iex standalone
    cmds:
      - PHX_SERVER=$PHX_SERVER iex -S mix
    env:
      PHX_SERVER: false

  start.psql:
    desc: Starts psql
    summary: |
      \du - For Listing all
      quit - To quit
    cmds:
      - psql -U postgres

  analyze.cons:
    desc: Analyze code, using Credo, for consistency
    cmds:
      - cmd: mix credo
        ignore_error: true

  analyze.vuln:
    desc: Analyze code, using Sobelow, for vulnerabilities
    cmds:
      - cmd: mix sobelow --compact
        ignore_error: true

  format.check:
    desc: Format code
    cmds:
      - mix format --check-formatted

  format.code:
    desc: Format code
    cmds:
      - mix format

  update.deps:
    desc: Update all dependencies
    cmds:
      - mix deps.update --all
      - tasks: [install:deps]

  clear.db:
    desc: Reset the database and its tables
    cmds:
      - mix ecto.reset

  clear.deps:
    desc: Reset the unused dependencies
    cmds:
      - mix deps.clean --unused

  clear.branches:
    desc: Clear local branches which are already merged.
    cmds:
      - git for-each-ref --format '%(refname:short)' refs/heads --no-merged | grep -v "master\|main" | xargs git branch -D
